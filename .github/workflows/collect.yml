name: Benchmark-Daten sammeln

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1,4'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Daten sammeln
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python collect_data.py --n 100 --output data/

      - name: Dateien pushen
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/
          git diff --staged --quiet || git commit -m "data: update benchmarks"
          git push
